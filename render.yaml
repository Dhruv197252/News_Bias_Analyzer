services:
  - type: web
    name: slant-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
      python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually on Render dashboard
      - key: GEMINI_API_KEY
        sync: false          # Set manually on Render dashboard
      - key: CORS_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health
    autoDeploy: true
